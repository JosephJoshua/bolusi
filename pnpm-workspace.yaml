# Workspaces + catalog — the single pin location (08-stack-and-repo §2, §5.1).
# Every version here is exact (08 §2.1); bootstrap-pin resolutions are recorded in 08 §7.
packages:
  - apps/*
  - packages/*
  - tooling/*

catalog:
  # §2.2 mobile native + Expo (exact pins; SDK-57-aligned expo-* live in apps/mobile via `npx expo install`)
  expo: 57.0.4
  '@op-engineering/op-sqlite': 17.1.2
  react-native-quick-crypto: 1.1.6
  react-native-nitro-modules: 0.36.1
  react-native-quick-base64: 3.0.1
  kysely-generic-sqlite: 2.0.0

  # §2.3 shared pure-TS (Hermes + Node)
  zod: 4.4.3
  canonicalize: 3.0.0
  kysely: 0.29.3
  '@noble/curves': 2.2.0
  '@noble/hashes': 2.2.0
  # i18n runtime (07-i18n §2; versions verified against current docs at implementation).
  # intl-messageformat is i18next-icu's peer dep (declared range >=10.3.3 <12.0.0).
  i18next: 26.3.6
  i18next-icu: 2.4.4
  intl-messageformat: 11.2.11

  # §2.4 server
  hono: 4.12.30
  '@hono/node-server': 2.0.8
  ws: 8.21.1
  '@hono/zod-validator': 0.8.0
  pg: 8.22.0
  kysely-ctl: 0.21.0
  kysely-codegen: 0.20.0

  # §2.5 tooling / test-only (bootstrap pins, 08 §7)
  vitest: 4.1.10
  '@electric-sql/pglite': 0.5.4
  better-sqlite3: 12.11.1
  eslint: 9.39.5
  prettier: 3.9.5
  # ICU syntax gate (07-i18n §7.3) — the parser behind i18next-icu's intl-messageformat,
  # used build-time only; never bundled into the app.
  '@formatjs/icu-messageformat-parser': 3.5.14

  # bootstrap support pins (recorded in 08 §7)
  typescript: 5.9.3
  typescript-eslint: 8.64.0
  '@types/better-sqlite3': 7.6.13
  '@types/node': 22.20.1
  '@types/pg': 8.20.0
  '@types/ws': 8.18.1
  lint-staged: 17.0.8
  tsx: 4.23.1
