# Dev services (08-stack-and-repo §6.1): Postgres 16 only — no redis, no queues in v0.
# `pnpm db:up` = docker compose up -d --wait (healthcheck-gated).
# Credentials are local-dev-only; real environments never use compose (security-guide §10).
services:
  postgres:
    image: postgres:16-alpine
    ports:
      # loopback only — the dev database is never exposed on the LAN
      - '127.0.0.1:5432:5432'
    environment:
      POSTGRES_USER: bolusi
      POSTGRES_PASSWORD: bolusi
    volumes:
      - bolusi-pgdata:/var/lib/postgresql/data
      - ./scripts/pg-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U bolusi -d postgres']
      interval: 2s
      timeout: 3s
      retries: 30

volumes:
  bolusi-pgdata:
