# Chaos harness — nightly (testing-guide §3.7). Beyond the per-PR merge gate (seeds 1–10, CI-scale
# volumes in ci.yml stage 11), the nightly runs 100 PRNG-chosen seeds per scenario at ×4 volumes
# (`pnpm chaos:nightly` → CHAOS_NIGHTLY=1 CHAOS_SCALE=4). The seed list AND the scale are LOGGED at
# run start (reporter.ts), and each failing test prints its verbatim reproduction command — which
# MUST carry the scale, because CHAOS_SCALE changes the concrete op sequence (not just the volume),
# so scale 1 would reproduce a DIFFERENT run:
#   CHAOS_SEEDS=<printed seed> CHAOS_SCALE=<printed scale> pnpm chaos
#
# PER-SCENARIO ×4 SEED CAP (§3.7 D-CHAOS-SCALE, task 113) — stated here so this job's coverage claim
# matches what it runs. "100 seeds at ×4" holds for every scenario EXCEPT the two heavy ones, whose
# single ×4 seed is minutes-to-an-hour and whose 100-seed sweep would never finish (CHAOS-03 ×4 =
# 56,000 ops/seed ≈ 40 min ⇒ ~2.7 days; CHAOS-08 ×4 = 80,000 ops/seed ≈ 3.6 min ⇒ ~6 h). Those two
# run the FULL ×4 VOLUME (never reduced — that is the point of this lane) over a capped SEED SAMPLE:
#
#   CHAOS-03 → 3 seeds     CHAOS-08 → 5 seeds     (every other scenario → the full 100)
#
# The caps live in ONE registry (`packages/harness/src/nightly-scale.ts` → NIGHTLY_X4_SEED_CAPS),
# are announced per scenario in this job's log, and are asserted against this comment and
# testing-guide §3.7 by `packages/harness/scenarios/nightly-seed-cap.test.ts` — so the cap can never
# drift from what these three places claim. `CHAOS_X4_SEED_CAP=<n>` (workflow_dispatch env or a local
# run) deepens the sample; an explicit `CHAOS_SEEDS=` reproduction is never capped.
#
# PGlite is in-process WASM — no Postgres container, no cross-worktree collision (T-14d). The
# real-Postgres L3 job the §3.7 nightly also names lives in the RLS lane (test:rls), not here.
name: chaos-nightly

on:
  schedule:
    # 02:30 UTC daily — off the PR-traffic peak.
    - cron: '30 2 * * *'
  workflow_dispatch:
    inputs:
      runSeed:
        description: 'Nightly run seed (derives the 100 PRNG seeds; default 1)'
        required: false
        default: '1'

jobs:
  chaos-nightly:
    runs-on: ubuntu-latest
    # The extended lane is deliberately long-running (§3.7 volumes ×4); it never gates a PR.
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Run chaos scenarios at nightly scale
        env:
          CHAOS_NIGHTLY_RUN_SEED: ${{ github.event.inputs.runSeed || '1' }}
        run: pnpm chaos:nightly
