# CI pipeline skeleton (08-stack-and-repo §5.6). Stages 1–4 gate every PR now;
# stages 6–12 are named placeholders wired by their owning tasks (linked per job).
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Stage 1 — install: frozen lockfile + single-zod + forbidden-packages checks.
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: node scripts/check-single-zod.mjs
      - run: node scripts/check-forbidden-packages.mjs

  # Stage 2 — lint + boundaries (all four bolusi rules at error).
  lint:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      # 07-i18n §7.3 catalog gates: seed parity vs ui-labels.md, key grammar, collision,
      # id/en parity, ICU restricted subset, error-code coverage, extraction, codegen staleness.
      - run: pnpm i18n:check

  # Stage 3 — typecheck (tsc -b + mobile --noEmit).
  typecheck:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  # Stage 4 — unit. Includes stage 5 (the Node JCS vector suite,
  # packages/core/test/jcs-vectors — 08 §5.6) and SEC-META-01 / SEC-SECRET-02 from
  # @bolusi/test-support.
  unit:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # SEC-SECRET-02's fixture test shells out to gitleaks. Release artifact is
      # checksum-pinned (verified against gitleaks_8.30.1_checksums.txt at bootstrap).
      - name: install gitleaks (checksum-pinned)
        run: |
          curl -sL -o gitleaks.tgz https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  gitleaks.tgz" | sha256sum -c -
          tar xzf gitleaks.tgz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          rm gitleaks.tgz
      - run: pnpm test

  # Stage 6 — SEC-OPLOG-06: JCS vectors executed on a real Hermes VM and compared
  # byte-for-byte against the Node run (08 §5.6; mechanism + version caveat in 08 §7).
  #
  # `pnpm test:jcs-hermes` typechecks scripts/hermes-vectors/runner.ts under the
  # platform-free lock (types: []), bundles it standalone (canonicalize + core
  # serialization + vector data only), compiles it with the RN-PINNED hermesc from
  # `hermes-compiler`, executes it on Node and on the checksum-pinned Hermes CLI
  # v0.13.0, and fails on any divergence.
  #
  # SCOPE — what this stage does and does NOT prove:
  #   DOES: RFC 8785 canonicalization, incl. ES number->string, is byte-identical on
  #         Node and a real Hermes VM (Appendix B + 200 seeded envelopes).
  #   DOES NOT: cover the 07-i18n §5.4 i18n vectors. They are NOT run here and must not
  #         be wired in. Measured on this VM: `typeof Intl === 'undefined'` — Intl is a
  #         Hermes BUILD FLAG (HERMES_ENABLE_INTL); RN's Android Hermes enables it
  #         (Android supplies ICU), this desktop CLI build does not. Running the
  #         Intl-backed i18n vectors here would manufacture a FALSE FAILURE on a
  #         formatting suite that is actually correct, and could trip 07-i18n §2's
  #         @formatjs/intl-pluralrules contingency on a test-VM artifact — i.e. ship an
  #         unnecessary polyfill to production. The JCS vectors are safe here precisely
  #         because RFC 8785 number->string is plain ECMAScript with no Intl involved.
  #         The i18n entry (packages/i18n/test/hermes-entry.ts, task 22 — runner-free,
  #         prints PASS/FAIL per vector, non-zero exit on mismatch) still needs an
  #         Intl-enabled Hermes: the Android-emulator lane or L6 / stage 12 (task 27).
  #         Whoever wires that lane records the outcome in ai-docs/tasks/22-i18n.md.
  #
  # Version caveat (08 §7 record 6): RN 0.86 pins hermes-v0.17.0, whose git tag ships NO
  # host-VM release asset, and hermes-compiler ships only a COMPILER. v0.13.0 is the
  # newest prebuilt host VM. The exact-RN-version proof runs on device in L6 / stage 12
  # (task 27), which testing-guide §2.1 L7 already requires.
  jcs-vectors-hermes:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:jcs-hermes

  # Stage 7 — Ed25519 interop: noble reproduces every @bolusi/test-support vector
  # (the Node side of the quick-crypto <-> noble RFC 8032 contract, testing-guide §2.2).
  # The quick-crypto side of the same fixture file runs in stage 12 (task 27).
  ed25519-interop:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:ed25519-interop

  # Stage 8 — server integration vs PGlite (pnpm test:server).
  # EVERY-PR PLACEHOLDER — wired by task 12 (ai-docs/tasks/12-server-app.md);
  # deferral recorded in 08 §7.
  server-integration:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - run: echo "placeholder — server integration suite lands with task 12 (pnpm test:server)"

  # Gitleaks job (security-guide §10, SEC-SECRET-02): full-history scan.
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Stage 9 — RLS witness vs dockerized postgres:16. MERGE-GATE PLACEHOLDER —
  # wired by task 05 (ai-docs/tasks/05-db-server.md); runs `pnpm test:rls`.
  rls-witness:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - run: echo "merge-gate placeholder — RLS witness lands with task 05 (pnpm test:rls)"

  # Stage 10 — dual-dialect appliers. MERGE-GATE PLACEHOLDER —
  # wired by task 11 (ai-docs/tasks/11-module-contract.md); runs `pnpm test:appliers`.
  dual-dialect-appliers:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - run: echo "merge-gate placeholder — applier suite lands with task 11 (pnpm test:appliers)"

  # Stage 11 — chaos harness. MERGE-GATE PLACEHOLDER —
  # wired by task 26 (ai-docs/tasks/26-chaos-harness.md); runs `pnpm chaos`.
  chaos-harness:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - run: echo "merge-gate placeholder — chaos scenarios land with task 26 (pnpm chaos)"

  # Stage 12 — device lane (EAS dev-client build + on-device smoke). PLACEHOLDER —
  # wired by task 27 (ai-docs/tasks/27-device-gates.md); fingerprint-triggered on native change.
  device-lane:
    runs-on: ubuntu-latest
    steps:
      - run: echo "placeholder — device lane lands with task 27 (EAS build + on-device smoke)"
