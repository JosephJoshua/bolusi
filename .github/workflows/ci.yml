# CI pipeline (08-stack-and-repo §5.6). Stages 1–11 run real suites and gate as §5.6 labels them;
# stage 12 (device-lane) is the sole remaining placeholder — a FAIL-SAFE stub that exits non-zero
# until task 27 wires the EAS + on-device lane, never a green-for-nothing echo (CLAUDE.md §2.11).
name: ci

on:
  push:
    branches: [main]
  pull_request:
  # The Android EMULATOR correctness lane (stage 12, task 27a) is "native change / scheduled", not
  # per-PR: booting an AVD + a native release build is minutes, and an emulator answers CORRECTNESS
  # only (D20 §1), so it runs nightly and on demand. Its Node-side legs (SEED-200K, the parser,
  # flag-gating, budget constants) DO run every PR — they are plain vitest, swept by the `unit` job.
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

jobs:
  # Stage 1 — install: frozen lockfile + single-zod + forbidden-packages checks.
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: node scripts/check-single-zod.mjs
      - run: node scripts/check-forbidden-packages.mjs
      # No raw control byte (a NUL delimiter, say) in a text-source file — it turns the file BINARY to
      # git and its diff unreviewable, while every test stays green (CLAUDE.md §2.9). Also runs in the
      # pre-commit hook; here it is the backstop for anything committed with --no-verify.
      - run: node scripts/check-no-control-bytes.mjs
      # 08 §5.6: every test script builds the cross-package dists it imports. Static — no
      # build or database needed — so it runs here in stage 1 and names the offending script
      # in seconds, rather than surfacing as a mystery "Failed to resolve entry for package
      # @bolusi/core" (cold runner) or, worse, a lane silently reading a stale dist (local).
      # The same check is a unit test in @bolusi/test-support, so stage 4 catches it too.
      - run: node scripts/check-test-script-builds.mjs

  # Stage 2 — lint + boundaries (all four bolusi rules at error).
  lint:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      # 07-i18n §7.3 catalog gates: seed parity vs ui-labels.md, key grammar, collision,
      # id/en parity, ICU restricted subset, error-code coverage, extraction, codegen staleness.
      - run: pnpm i18n:check

  # Unused-export sweep (task 68; CLAUDE.md §2.11 / testing-guide T-14, T-16). Static — knip runs
  # the TypeScript language service over SOURCE (no dist, no build, no database), so `needs:
  # install` is sufficient and it slots beside lint/typecheck.
  #
  # `pnpm knip` is NOT `knip && echo ok`. Task 60 proved a grep sweep for exported-and-uncalled
  # symbols cannot work (grep scores a MENTION as a CALL — a false comment made the dead function
  # `canAttempt` look live, and the sweep missed the one case it was written for). knip answers the
  # question semantically. But a semantic sweep's dominant failure here is going BLIND and reporting
  # a confident zero — task 60 watched THIS config do it twice (`includeEntryExports` off; a broken
  # entry glob). So `scripts/check-unused-exports.mjs` reads knip's OWN JSON (§2.1) and: (1) asserts
  # the `knip-canary.ts` positive control is still reported — the denominator (T-14), it vanishes
  # first whenever the sweep goes blind; (2) fails on NEW unused production exports vs the checked-in
  # `knip-baseline.json` (a fresh `canAttempt`); (3) fails on MASS DISAPPEARANCE, which a bare
  # additions check would pass green while knip silently scanned a fraction of the tree. Falsified
  # (task 68): dropping `includeEntryExports` collapsed 115->11 findings and the gate went RED on the
  # missing canary, where an additions-only check would have gone green.
  unused-exports:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm knip

  # Stage 3 — typecheck (tsc -b + mobile --noEmit).
  typecheck:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  # Stage 4 — unit. Includes stage 5 (the Node JCS vector suite,
  # packages/core/test/jcs-vectors — 08 §5.6) and SEC-META-01 / SEC-SECRET-02 from
  # @bolusi/test-support.
  unit:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # SEC-SECRET-02's fixture test shells out to gitleaks. Release artifact is
      # checksum-pinned (verified against gitleaks_8.30.1_checksums.txt at bootstrap).
      - name: install gitleaks (checksum-pinned)
        run: |
          curl -sL -o gitleaks.tgz https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  gitleaks.tgz" | sha256sum -c -
          tar xzf gitleaks.tgz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          rm gitleaks.tgz
      - run: pnpm test

  # Client DB lane (task 04): build, unit + driver-conformance, and the codegen diff.
  #
  # The conformance suite (testing-guide §2.3) runs here against the better-sqlite3
  # in-memory adapter. SQLCipher is OFF in this lane BY DESIGN — better-sqlite3 ships
  # none, and op-sqlite is a JSI module that cannot run in Node. SEC-DEV-06's on-device
  # leg (real SQLCipher, DB file bytes) belongs to the device lane (task 27); nothing here
  # may be read as evidence about encryption at rest.
  db-client:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -F @bolusi/db-client build
      - name: unit + driver conformance (better-sqlite3 lane, SQLCipher off by design)
        run: pnpm -F @bolusi/db-client test
      # 10-db §11.4: rebuild a scratch SQLite DB from every client migration, regenerate,
      # and diff. A migration landed without regenerating fails here.
      - name: client codegen types are up to date (10-db §11.4)
        run: |
          pnpm -F @bolusi/db-client db:codegen
          git diff --exit-code -- packages/db-client/src/generated

  # Stage 6 — SEC-OPLOG-06: JCS vectors executed on a real Hermes VM and compared
  # byte-for-byte against the Node run (08 §5.6; mechanism + version caveat in 08 §7).
  #
  # `pnpm test:jcs-hermes` typechecks scripts/hermes-vectors/runner.ts under the
  # platform-free lock (types: []), bundles it standalone (canonicalize + core
  # serialization + vector data only), compiles it with the RN-PINNED hermesc from
  # `hermes-compiler`, executes it on Node and on the checksum-pinned Hermes CLI
  # v0.13.0, and fails on any divergence.
  #
  # SCOPE — what this stage does and does NOT prove:
  #   DOES: RFC 8785 canonicalization, incl. ES number->string, is byte-identical on
  #         Node and a real Hermes VM (Appendix B + 200 seeded envelopes).
  #   DOES NOT: cover the 07-i18n §5.4 i18n vectors. They are NOT run here and must not
  #         be wired in. Measured on this VM: `typeof Intl === 'undefined'` — Intl is a
  #         Hermes BUILD FLAG (HERMES_ENABLE_INTL); RN's Android Hermes enables it
  #         (Android supplies ICU), this desktop CLI build does not. Running the
  #         Intl-backed i18n vectors here would manufacture a FALSE FAILURE on a
  #         formatting suite that is actually correct, and could trip 07-i18n §2's
  #         @formatjs/intl-pluralrules contingency on a test-VM artifact — i.e. ship an
  #         unnecessary polyfill to production. The JCS vectors are safe here precisely
  #         because RFC 8785 number->string is plain ECMAScript with no Intl involved.
  #         The i18n entry (packages/i18n/test/hermes-entry.ts, task 22 — runner-free,
  #         prints PASS/FAIL per vector, non-zero exit on mismatch) still needs an
  #         Intl-enabled Hermes: the Android-emulator lane or L6 / stage 12 (task 27).
  #         Whoever wires that lane records the outcome in ai-docs/tasks/22-i18n.md.
  #
  # Version caveat (08 §7 record 6): RN 0.86 pins hermes-v0.17.0, whose git tag ships NO
  # host-VM release asset, and hermes-compiler ships only a COMPILER. v0.13.0 is the
  # newest prebuilt host VM. The exact-RN-version proof runs on device in L6 / stage 12
  # (task 27), which testing-guide §2.1 L7 already requires.
  jcs-vectors-hermes:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:jcs-hermes

  # Stage 7 — Ed25519 interop: noble reproduces every @bolusi/test-support vector
  # (the Node side of the quick-crypto <-> noble RFC 8032 contract, testing-guide §2.2).
  # The quick-crypto side of the same fixture file runs in stage 12 (task 27).
  ed25519-interop:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:ed25519-interop

  # Stage 8 — server integration vs REAL postgres:16 in a testcontainer (08 §5.6, D16, task 81).
  # Every-PR gate: the Hono app's integration suite against the real middleware chain, incl. the
  # SEC-SYNC gzip/auth adversarial tests (security-guide §4.2).
  #
  # WAS PGlite; NO LONGER. The old comment here claimed "NO postgres service container BY DESIGN …
  # every DB-backed test boots its own in-process PGlite" — true until task 81 moved this lane onto
  # the SAME real-PG16 machinery db-server uses (rls-witness, stage 9). `test:server` now boots its
  # OWN postgres:16 container via `@bolusi/db-server/testing` (the seam owns `pg`; apps/server never
  # imports a driver), migrates a template once, clones a database per test, and connects as
  # `bolusi_app` (NOBYPASSRLS) so RLS is non-vacuous (T-14b). PGlite is GONE from apps/server — the
  # push pipeline, validation stages, conflict-detection and projection-apply were witnessed only by
  # a lane blind to the silent int8 class (D16 / T-14f); they now run over the production driver.
  #
  # STILL NO `services:` BLOCK, and that is the fix, not an omission (same ruling as rls-witness):
  # testcontainers boots and OWNS the container from inside the process, with an ephemeral port and
  # a per-run attribution stamp asserted before any test — a declared `services:` postgres would sit
  # UNUSED while every test connected to the testcontainer, a real green with fictional provenance
  # (T-14d). Docker is available on ubuntu-latest, which is what makes the container lane viable, and
  # Ryuk reaps it however the job ends.
  #
  # `tsc -b` is inside `test:server` per the 08 §5.6 normative convention (cross-package dist
  # imports must build first), so `needs: install` alone is sufficient on a cold runner.
  server-integration:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: server integration suite vs real Postgres 16 (testcontainers, D16)
        run: pnpm test:server

  # Gitleaks job (security-guide §10, SEC-SECRET-02): full-history scan.
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Stage 9 — RLS witness vs real postgres:16 in a testcontainer (08 §5.6, D16). MERGE GATE.
  #
  # This is no longer a "drift check" behind a fast PGlite lane, and the old framing is deleted
  # rather than softened: db-server HAS no PGlite lane any more (task 73 removed the branch rather
  # than defaulting it, because a lane that can be downgraded to WASM will be, silently). This job
  # runs the ONLY engine this suite has. `test:rls` boots its own postgres:16 container, migrates
  # a template once, and clones a database per file.
  #
  # 08 §2.5's "do not trust WASM as the only RLS witness" is now satisfied by construction rather
  # than by a second job: there is no WASM witness left to distrust. What made the old PGlite lane
  # dangerous was never speed — it was that PGlite connects as a superuser, and superusers bypass
  # RLS, so its RLS suite could not fail (T-14b). Measured on this branch: neutering `SET LOCAL
  # ROLE bolusi_app` turns cross-tenant SELECT/INSERT/UPDATE/DELETE all green-for-the-wrong-reason
  # — `expected 'test' to be 'bolusi_app'`. The ROLE closes it, not the engine.
  #
  # NO separate build step, and that is deliberate rather than the omission it was: `tsc -b` is
  # INSIDE `test:rls` per the 08 §5.6 normative convention (same as `test:server` above), so the
  # lane is self-sufficient on a cold runner and `needs: install` alone suffices. Adding a build
  # step here would fix this job while leaving every OTHER caller of `test:rls` — every local
  # run, every falsification — reading whatever dist it happened to find. Until task 55 the
  # prefix was missing and this job could not load the three db-server files that import
  # @bolusi/core: measured, 3 files failed to resolve while the run still reported "90 passed"
  # from the 12 that don't. The three that carry every real-`pg` claim contributed zero tests.
  # `scripts/check-test-script-builds.mjs` (stage 1) is what keeps the prefix from going missing
  # again; do not "simplify" it away.
  rls-witness:
    runs-on: ubuntu-latest
    needs: install
    # NO `services:` BLOCK, NO DATABASE_URL, NO db:stamp — AND THAT IS THE FIX, NOT AN OMISSION.
    #
    # This job used to declare a `postgres:16-alpine` service container, inject DATABASE_URL and
    # BOLUSI_DB_OWNER, and run `pnpm db:stamp` to claim it. Under D16/task 73 `test:rls` boots and
    # owns its OWN postgres:16 container via testcontainers and reads NONE of that: no db-server
    # test code resolves DATABASE_URL any more (test/helpers/db-target.ts is gone). So the job
    # would have gone green against a container it started itself while every line of its config
    # said it had tested the service container.
    #
    # That is a REAL NUMBER WITH FICTIONAL PROVENANCE — the precise failure this task exists to
    # eliminate (T-14d: task 13's "82/11 on real PG16" served by task 05's leaked container),
    # re-created in CI by the change meant to close it. Caught by review-73, not by this lane's
    # own verification, because `test:rls` is green either way; only reading the CONFIG against
    # the CODE shows it. Leaving the service container as decoration would be strictly worse than
    # never having had one: a gate implying coverage it lacks is worse than an absent gate (§2.11).
    #
    # Docker is available on ubuntu-latest runners, which is what makes the container lane viable
    # here at all; Ryuk reaps it when the job ends, however it ends.
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # SEC-TENANT-03's repo-wide grep: no session-level tenant context anywhere
      # (security-guide §8.1 — set_config(..., false) / bare SET app.tenant_id).
      - run: node scripts/check-tenant-context.mjs
      # Attribution has not been dropped — it moved from a stamp-what-CI-provisioned step into the
      # lane itself, where it is now true BY CONSTRUCTION rather than by a job remembering to
      # claim a database: the container is created by this process, its port is ephemeral and
      # derived from it, every cloned database is stamped at creation with a token unique to this
      # run, and the suite refuses an absent or foreign stamp before any test executes
      # (packages/db-server/src/testing/pg-container.ts). The provenance line it prints on every
      # run — "PostgreSQL 16.14 … owned by 'l3lane-<pid>-<t>'" — is the evidence §2.1 asks for.
      - name: RLS suite vs real Postgres 16 (testcontainers, D16)
        run: pnpm test:rls

  # Codegen drift (10-db §11.3): migrate a real postgres, re-run kysely-codegen, fail on any
  # diff against the committed src/generated/db.ts. Hand-edited or stale types cannot survive.
  codegen-diff:
    runs-on: ubuntu-latest
    needs: install
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bolusi
          POSTGRES_PASSWORD: bolusi
          POSTGRES_DB: bolusi_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bolusi -d bolusi_dev"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 30
    # An injected DATABASE_URL puts the lane runner in its external mode: it uses this URL
    # as-is and never touches compose. No owner token here on purpose — nothing in this job
    # runs the attribution gate (that is the db-server test lane, i.e. rls-witness), and a
    # token nobody checks is ceremony that the next agent would rightly delete.
    env:
      DATABASE_URL: postgres://bolusi:bolusi@localhost:5432/bolusi_dev
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:migrate
      # --verify is kysely-codegen's own drift check; the git diff below is the belt to its
      # braces (it also catches a hand-edit that --verify would regenerate away).
      - run: pnpm db:codegen:check
      - run: pnpm db:codegen
      - name: fail on generated-type drift
        run: git diff --exit-code -- packages/db-server/src/generated/db.ts

  # Stage 10 — dual-dialect appliers (wired by task 11). The T-8 merge gate: every module's
  # appliers folded through the real projection engine against BOTH engines — better-sqlite3 behind
  # the shim dialect and PGlite (real PostgreSQL 18) — asserting byte-equal oracle digests
  # (testing-guide §2.4, 04-module-contract §2).
  #
  # No services block: PGlite is in-process WASM, so this stage needs no Postgres container and
  # cannot collide with another worktree's database (T-14d).
  dual-dialect-appliers:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:appliers

  # Stage 11 — chaos harness (testing-guide Part B, D4). The real `@bolusi/server` in-process on
  # PGlite plus N virtual devices; seeds 1–10 per scenario at CI-scale volumes. PGlite is in-process
  # WASM (§6.3 "no docker needed"), so — like dual-dialect-appliers — this stage needs no Postgres
  # container and cannot collide with another worktree's database (T-14d). Every failure prints its
  # reproducing seed (§3.7).
  chaos-harness:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm chaos

  # Stage 13 — SECURITY SWEEP / release gate (task 28; 08 §5.6, security-guide §12). MERGE GATE.
  #
  # `pnpm sec:sweep` is one command with one report: it builds, runs the repo suite AND the
  # security-sweep lane (packages/harness/vitest.security.config.ts) with a JSON reporter, then
  # runs the SEC inventory over those reports, the repo secrets scan (working tree + FULL git
  # history + .env discipline), and the dependency pin/lockfile audit against 08 §2.
  #
  # THERE WAS NO RELEASE-GATE PLACEHOLDER TO REPLACE. Task 28's file says this stage replaces one;
  # the only placeholder in this pipeline is stage 12 (device-lane), which belongs to task 27. So
  # this is a NEW job, and it is deliberately NOT a fail-safe stub: it runs the real sweep.
  #
  # IT IS EXPECTED TO BE RED TODAY, AND THAT IS THE GATE WORKING (CLAUDE.md §2.11). Three things
  # keep it red, all recorded rather than papered over:
  #   1. the SEC pending allowlist is non-empty — SEC-AUTH-10 is owed by task 27 (device-blocked)
  #      and SEC-AUTH-09's leg 1 needs real SQLCipher, which only task 27a's lane has;
  #   2. `POST /v1/media/:id/init` answers 500 for a cross-tenant media id and 404 for a
  #      same-tenant unassigned-store one — a cross-tenant existence oracle SEC-TENANT-04 catches;
  #   3. security-guide §12's roll-up line omits SEC-DEV-08, which task 58 shipped.
  # Each has its own task file. Weakening a step to make this green would convert three known
  # risks into one false assurance — the exact anti-pattern §2.11 names.
  #
  # It needs gitleaks (the history scan) and Docker (the repo suite's testcontainers lanes);
  # ubuntu-latest supplies Docker, and the gitleaks install below is the same checksum-pinned
  # release the `unit` job uses.
  security-sweep:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
        with:
          # The secrets scan walks the FULL history — a shallow clone would scan a few commits and
          # report a confident zero (T-14: a sweep that goes blind reports green).
          fetch-depth: 0
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: install gitleaks (checksum-pinned)
        run: |
          curl -sL -o gitleaks.tgz https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  gitleaks.tgz" | sha256sum -c -
          tar xzf gitleaks.tgz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          rm gitleaks.tgz
      - name: security sweep (SEC inventory + SEC-TENANT-04 walk + secrets + dependency audit)
        run: pnpm sec:sweep

  # Stage 12 — Android EMULATOR CORRECTNESS lane (task 27a; D20 §1, 08 §5.6 stage 12). REPLACES the
  # task-36 fail-safe `device-lane` stub. Scheduled / on-demand, NOT per-PR (see the `on:` note).
  #
  # WHAT THIS PROVES (emulator-answerable CORRECTNESS only): the shipping release/`test`-profile APK
  # boots its own Hermes 0.17 and real SQLCipher (the ONLY place real SQLCipher runs — CI/Node has
  # none), so `pnpm harness:device` captures the `BOLUSI_HARNESS_RESULT` JSON and its parser gates on:
  # SEC-DEV-06 at-rest WITH its T-14b positive control, SEC-AUTH-09 leg 1 (verifier bytes confined to
  # the SQLCipher DB), the SEC-OPLOG-06 JCS vectors on Hermes 0.17 (D13), and CHAOS-01/03/06/07
  # convergence at reduced volume. EVERY figure it reports is EMULATOR, never a device number.
  #
  # WHAT IT DOES NOT PROVE (D12/D20): the Part C PERFORMANCE gates P-1..P-6 (cold start, rebuild
  # time/memory, backlog time, KDF p95, command latency) and SEC-AUTH-10 (argon2id timing) — those
  # need the physical 2 GB device (task 27b, owner-deferred) and are NOT run or asserted here.
  #
  # FAIL-SAFE (CLAUDE.md §2.11 / §2.1): `harness:device` exits non-zero on ANY red gate, missing
  # gate, non-release build, or stale/absent capture — a broken build/emulator step errors the job
  # (red), never a green-for-nothing echo. The prebuild + Gradle assemble below is the part that
  # needs a real CI run to shake out (unverifiable on the Linux dev host, D12/D13); because this job
  # is scheduled/dispatch, a first-run failure is a red scheduled job, never a false green on a PR.
  android-emulator:
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - run: pnpm install --frozen-lockfile
      # KVM permissions so the AVD runs hardware-accelerated (android-emulator-runner requirement).
      - name: enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      # Build the release/test-profile APK with the harness compiled in. UNVERIFIED here — the native
      # toolchain (op-sqlite+SQLCipher, quick-crypto/nitro) only assembles in this lane, not on the
      # dev host. Release signing config is Expo's template default; a first scheduled run validates it.
      # Metro bundles `apps/mobile/index.ts`, which imports the workspace packages; their
      # package.json `exports` point at `dist/`, which nothing in this job had built. Observed on
      # this lane's second-ever run (29890798289): `While trying to resolve module '@bolusi/core' …
      # the resolution … is packages/core/dist/index.js, however this file does not exist` →
      # `Android Bundling failed`. `tsc -b` is the same build every `test:*` script runs first.
      - name: build workspace packages (Metro resolves @bolusi/* through dist/)
        run: npx tsc -b
      - name: prebuild + assemble release APK (BOLUSI_TEST_HARNESS=1)
        env:
          BOLUSI_TEST_HARNESS: '1'
          EXPO_PUBLIC_API_URL: 'http://10.0.2.2:3000'
        run: |
          pnpm --filter @bolusi/mobile exec expo prebuild --platform android --no-install
          # `expo prebuild` writes the Gradle wrapper into apps/mobile/android — there is no
          # ./gradlew at the repo root, and invoking one there fails with exit 127 before Gradle is
          # ever reached. Observed on this lane's FIRST-EVER run (29890632296, 2026-07-22):
          # `./gradlew: No such file or directory`. `-p` sets Gradle's project dir; it does not
          # locate the wrapper script, so the path to the wrapper has to be right on its own.
          ./apps/mobile/android/gradlew -p apps/mobile/android assembleRelease
      # Task 117: install the Maestro CLI on the runner host (no emulator needed yet). Maestro's
      # documented installer drops the binary in ~/.maestro/bin; the temurin-17 JDK this job already
      # set up is its JVM runtime. Added to $GITHUB_PATH so later steps resolve `maestro`.
      - name: install Maestro CLI (task 117)
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"
      # Boot the AVD with the shipping Hermes 0.17 (real 0.17 == device 0.17, D13). ONE boot serves
      # BOTH 27a's harness correctness driver AND task 117's Maestro native E2E: the emulator lives
      # only for the duration of android-emulator-runner's `script`, so the Maestro run MUST sit
      # inside it — a second android-emulator-runner would boot a SECOND AVD (forbidden). The
      # `set -euo pipefail` wrapper with NO `|| true` and NO `continue-on-error` is the §2.11
      # fail-safe: a red harness OR a red Maestro flow exits non-zero and fails the JOB. 27a's harness
      # command is byte-unchanged and runs FIRST, unmasked; Maestro then installs the test-profile APK
      # and drives the real native RN app on the same AVD.
      - name: harness correctness gates + Maestro native E2E on the emulator (every figure EMULATOR)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6
          script: |
            set -euo pipefail
            export PATH="$HOME/.maestro/bin:$PATH"
            APK=apps/mobile/android/app/build/outputs/apk/release/app-release.apk
            # 27a's correctness driver — UNCHANGED command, runs first and unmasked.
            pnpm harness:device --apk "$APK"
            # Task 117: install the test-profile APK so Maestro's launchApp (appId com.bolusi.app)
            # finds it, then drive the real native app. `maestro test .maestro/` runs only the
            # top-level LIVE flow by default; .maestro/pending-119/* is skipped until task 119 wires
            # the live session shell. --test-output-dir collects screenshots for the upload step.
            adb install -r "$APK"
            maestro test --test-output-dir=maestro-artifacts .maestro/
      # Task 117: Maestro screenshots + artifacts. `if: always()` so a RED flow still uploads its
      # failure screenshots (the emulator is gone by now, but --test-output-dir wrote host files).
      - name: upload Maestro artifacts (task 117)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: maestro-native-e2e
          path: maestro-artifacts/
          if-no-files-found: warn
          retention-days: 7

  # Stage 14 — iOS Simulator BUILD lane (task 85; D18 §5, D20 §2). UNSIGNED, macos-latest,
  # scheduled / on-demand — NOT per-PR (macOS runners bill ~10× Linux; owner confirms public-vs-private
  # minutes, D18 §5). It is a NEW job beside the Android emulator lane (stage 12), self-contained, and
  # touches nothing there.
  #
  # WHAT THIS PROVES (Simulator-answerable, D20 §2): the real `expo prebuild --platform ios` generates a
  # full Xcode project from `app.config.ts`, `xcodebuild` COMPILES AND LINKS it for the Simulator, the
  # COMPILED app carries tasks 83/87's bundle identity + deliberate usage strings (asserted below on the
  # built `.app`'s Info.plist — the real prebuilt artifact, stronger than ios-config.test.ts's Linux
  # introspection), and the app BOOTS on a Simulator without crashing on launch. This closes the exact
  # gap ios-config.test.ts names ("no macOS host, no Xcode, no Simulator ... task 85 is the infra gap").
  #
  # WHAT IT DOES NOT PROVE (D18 §5 / D20 §2, the honest ceiling): NOTHING that needs a SIGNED build or a
  # physical iPhone — the EAS signed lane, Apple Developer enrollment, TestFlight, and real-device
  # Keychain / backup-exclusion semantics (security-guide §7.4 "never resurrected") stay owner-DEFERRED
  # and device-UNVERIFIED. Simulator Keychain/backup differ from a device; no green here is a device test.
  #
  # HONESTY (CLAUDE.md §2.1): this job RUNS IN CI, on a macOS runner. It was NOT and CANNOT be run on the
  # Linux dev host (no Xcode / no Simulator). The prebuild + pod install + xcodebuild + boot below is the
  # part a first real CI run must shake out (same posture as the Android lane's assemble step); because
  # this job is scheduled/dispatch, a first-run failure is a red scheduled job, never a false green on a PR.
  #
  # FAIL-SAFE (CLAUDE.md §2.11): every step propagates its non-zero exit — there is no `continue-on-error`
  # anywhere, and no `|| true` on build / install / launch. A compile/link failure, an absent Info.plist
  # key, a bundle-id drift, or a crash-on-launch each fail the job red.
  ios-simulator:
    runs-on: macos-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    env:
      # Present so `app.config.ts`'s `extra.apiUrl` is not null at build/launch. This lane only builds
      # and boots — it does NOT sync — so the value is an inert placeholder (localhost is the Simulator's
      # own host); the app never reaches the network in this job.
      EXPO_PUBLIC_API_URL: 'http://localhost:3000'
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Generate the native iOS project. `--no-install` keeps JS deps under pnpm's frozen lockfile
      # (mirrors the Android lane's `--no-install`); CocoaPods is installed explicitly next, since
      # `--no-install` skips the pod install prebuild would otherwise run.
      # Same reason as the Android lane: Metro resolves @bolusi/* through each package's `dist/`,
      # so the workspace must be built before xcodebuild runs the bundling phase. Same failure
      # observed on this lane's first-ever run (29890798289).
      - name: build workspace packages (Metro resolves @bolusi/* through dist/)
        run: npx tsc -b
      - name: expo prebuild (iOS native project)
        run: pnpm --filter @bolusi/mobile exec expo prebuild --platform ios --no-install
      # CocoaPods generates the .xcworkspace that xcodebuild builds from; preinstalled on macos-latest.
      - name: pod install
        working-directory: apps/mobile/ios
        run: pod install
      # UNSIGNED Release build for the Simulator. Release EMBEDS the JS bundle, so the app launches with
      # NO Metro server running (a Debug build would red-screen headlessly) — the same reason the Android
      # lane assembles Release. `CODE_SIGNING_ALLOWED=NO` etc.: Simulator builds need no Apple signing
      # (D20 §2), which is what lets this lane run with NO Apple account. Workspace/scheme are discovered
      # (Expo names them after the app) rather than hardcoded, so a rename cannot silently mis-target.
      - name: xcodebuild — unsigned iOS Simulator build (Release)
        working-directory: apps/mobile/ios
        run: |
          set -eu
          WORKSPACE=$(ls -d *.xcworkspace | head -1)
          test -n "$WORKSPACE"
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          xcodebuild \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "$RUNNER_TEMP/ios-build" \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" \
            build
      # Assert the COMPILED artifact carries tasks 83/87's identity and deliberate copy. PlistBuddy exits
      # non-zero if a key is absent; `grep -qF` fails the job if the value drifted from the Indonesian
      # string. This is the "does the generated Info.plist match 83/87" check on the real build output.
      - name: verify built Info.plist matches tasks 83/87
        run: |
          set -eu
          APP=$(find "$RUNNER_TEMP/ios-build/Build/Products" -maxdepth 3 -name '*.app' | head -1)
          test -n "$APP"
          PLIST="$APP/Info.plist"
          test "$(/usr/libexec/PlistBuddy -c 'Print :CFBundleIdentifier' "$PLIST")" = 'com.bolusi.app'
          /usr/libexec/PlistBuddy -c 'Print :NSCameraUsageDescription' "$PLIST" \
            | grep -qF 'Izinkan aplikasi memakai kamera untuk ambil foto.'
          /usr/libexec/PlistBuddy -c 'Print :NSLocationWhenInUseUsageDescription' "$PLIST" \
            | grep -qF 'Izinkan aplikasi memakai lokasi'
      # Boot a Simulator, install and launch — the does-it-launch gate. A native crash-on-launch (bad
      # link, missing dylib, a plist iOS rejects) fails install/launch non-zero. The liveness poll is the
      # real does-it-STAY-up signal: `simctl launch` returns a PID even for an app that crashes instantly.
      - name: boot Simulator, install + launch the app
        run: |
          set -eu
          APP=$(find "$RUNNER_TEMP/ios-build/Build/Products" -maxdepth 3 -name '*.app' | head -1)
          test -n "$APP"
          DEVICE=$(xcrun simctl list devices available --json \
            | jq -r '.devices | to_entries[] | .value[] | select(.name | startswith("iPhone")) | .udid' \
            | head -1)
          test -n "$DEVICE"
          xcrun simctl bootstatus "$DEVICE" -b
          xcrun simctl install "$DEVICE" "$APP"
          xcrun simctl launch "$DEVICE" com.bolusi.app
          sleep 8
          xcrun simctl spawn "$DEVICE" launchctl list | grep -q com.bolusi.app
