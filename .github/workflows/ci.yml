# CI pipeline skeleton (08-stack-and-repo §5.6). Stages 1–4 gate every PR now;
# stages 6–12 are named placeholders wired by their owning tasks (linked per job).
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Stage 1 — install: frozen lockfile + single-zod + forbidden-packages checks.
  install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: node scripts/check-single-zod.mjs
      - run: node scripts/check-forbidden-packages.mjs

  # Stage 2 — lint + boundaries (all four bolusi rules at error).
  lint:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      # 07-i18n §7.3 catalog gates: seed parity vs ui-labels.md, key grammar, collision,
      # id/en parity, ICU restricted subset, error-code coverage, extraction, codegen staleness.
      - run: pnpm i18n:check

  # Stage 3 — typecheck (tsc -b + mobile --noEmit).
  typecheck:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  # Stage 4 — unit (includes stage 5: JCS vectors on Node once task 03 lands them,
  # and SEC-META-01 / SEC-SECRET-02 from @bolusi/test-support).
  unit:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # SEC-SECRET-02's fixture test shells out to gitleaks. Release artifact is
      # checksum-pinned (verified against gitleaks_8.30.1_checksums.txt at bootstrap).
      - name: install gitleaks (checksum-pinned)
        run: |
          curl -sL -o gitleaks.tgz https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  gitleaks.tgz" | sha256sum -c -
          tar xzf gitleaks.tgz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          rm gitleaks.tgz
      - run: pnpm test

  # Client DB lane (task 04): build, unit + driver-conformance, and the codegen diff.
  #
  # The conformance suite (testing-guide §2.3) runs here against the better-sqlite3
  # in-memory adapter. SQLCipher is OFF in this lane BY DESIGN — better-sqlite3 ships
  # none, and op-sqlite is a JSI module that cannot run in Node. SEC-DEV-06's on-device
  # leg (real SQLCipher, DB file bytes) belongs to the device lane (task 27); nothing here
  # may be read as evidence about encryption at rest.
  db-client:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm -F @bolusi/db-client build
      - name: unit + driver conformance (better-sqlite3 lane, SQLCipher off by design)
        run: pnpm -F @bolusi/db-client test
      # 10-db §11.4: rebuild a scratch SQLite DB from every client migration, regenerate,
      # and diff. A migration landed without regenerating fails here.
      - name: client codegen types are up to date (10-db §11.4)
        run: |
          pnpm -F @bolusi/db-client db:codegen
          git diff --exit-code -- packages/db-client/src/generated

  # Stage 6 — JCS + crypto vectors AND the 07-i18n §5.4 i18n vectors on the Hermes VM matching
  # the pinned RN version.
  # PLACEHOLDER — wired by task 03 (ai-docs/tasks/03-crypto-canonical.md).
  # Candidate paths verified at bootstrap (08 §7):
  #   (a) preferred: compile the standalone vector bundle with `hermesc` from the
  #       `hermes-compiler` npm package RN 0.86 depends on (linux64 binary verified
  #       working at bootstrap) — but that package ships NO host Hermes VM to EXECUTE
  #       the bytecode, so execution needs a built hermes CLI, or
  #   (b) guaranteed fallback: run the same suite inside the Android-emulator job.
  # Task 03 picks the mechanism and records it in 08 §5.6/§7.
  #
  # i18n vectors (task 22, release-blocking): entry point is
  # packages/i18n/test/hermes-entry.ts — a runner-free module that prints a PASS/FAIL line per
  # §5.4 vector and sets a non-zero exit status on mismatch, so it drops into whichever
  # mechanism task 03 lands. It runs green on Node today (stage 4, packages/i18n
  # test/vectors.test.ts); Hermes is UNVERIFIED because it ships only a subset of Intl.
  # If the plural vector (`t('auth.pin.attemptsLeft', {count: 1})` → "1 try left") is the one
  # that fails, apply the 07-i18n §2 contingency: add @formatjs/intl-pluralrules — and nothing
  # else from FormatJS — then re-run and record the outcome in ai-docs/tasks/22-i18n.md.
  jcs-vectors-hermes:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - run: echo "placeholder — Hermes vector lane lands with task 03 (see job comment for the verified candidate paths and the task-22 i18n vector entry)"

  # Stage 7 — Ed25519 interop (noble sign→verify vs the @bolusi/test-support fixture set).
  # EVERY-PR PLACEHOLDER — wired by task 03 (ai-docs/tasks/03-crypto-canonical.md);
  # deferral recorded in 08 §7.
  ed25519-interop:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - run: echo "placeholder — Ed25519 interop vectors land with task 03 (noble side of the quick-crypto interop contract)"

  # Stage 8 — server integration vs PGlite (pnpm test:server).
  # EVERY-PR PLACEHOLDER — wired by task 12 (ai-docs/tasks/12-server-app.md);
  # deferral recorded in 08 §7.
  server-integration:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - run: echo "placeholder — server integration suite lands with task 12 (pnpm test:server)"

  # Gitleaks job (security-guide §10, SEC-SECRET-02): full-history scan.
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Stage 9 — RLS witness vs dockerized postgres:16. MERGE-GATE PLACEHOLDER —
  # wired by task 05 (ai-docs/tasks/05-db-server.md); runs `pnpm test:rls`.
  rls-witness:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - run: echo "merge-gate placeholder — RLS witness lands with task 05 (pnpm test:rls)"

  # Stage 10 — dual-dialect appliers. MERGE-GATE PLACEHOLDER —
  # wired by task 11 (ai-docs/tasks/11-module-contract.md); runs `pnpm test:appliers`.
  dual-dialect-appliers:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - run: echo "merge-gate placeholder — applier suite lands with task 11 (pnpm test:appliers)"

  # Stage 11 — chaos harness. MERGE-GATE PLACEHOLDER —
  # wired by task 26 (ai-docs/tasks/26-chaos-harness.md); runs `pnpm chaos`.
  chaos-harness:
    runs-on: ubuntu-latest
    needs: install
    steps:
      - run: echo "merge-gate placeholder — chaos scenarios land with task 26 (pnpm chaos)"

  # Stage 12 — device lane (EAS dev-client build + on-device smoke). PLACEHOLDER —
  # wired by task 27 (ai-docs/tasks/27-device-gates.md); fingerprint-triggered on native change.
  device-lane:
    runs-on: ubuntu-latest
    steps:
      - run: echo "placeholder — device lane lands with task 27 (EAS build + on-device smoke)"
